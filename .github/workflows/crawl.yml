name: Consumer alert crawl & Notion sync

on:
  schedule:
    # 매 4시간 (KST) — 07:30 / 11:30 / 15:30 / 19:30 / 23:30 / 03:30
    - cron: "30 22,2,6,10,14,18 * * *"
  workflow_dispatch: {}

concurrency:
  group: consumer-alert-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl consumer alerts and sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_SUMMARY_PAGE_ID: ${{ secrets.NOTION_SUMMARY_PAGE_ID }}
          NOTION_MENTION_USER_ID: ${{ secrets.NOTION_MENTION_USER_ID }}
        run: python run_headless.py
